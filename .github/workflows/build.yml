name: Build OPSINator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Windows: both binaries via Nuitka (AV false-positive avoidance).
  # The main app build is now fast (no TensorFlow in it at all).
  # The engine build is still the slow one - that's isolated and expected.
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install project dependencies
        run: pip install decimer rdkit nuitka
      - name: Build main app (opsinator)
        run: python -m nuitka --standalone --assume-yes-for-downloads --enable-plugin=tk-inter --output-dir=dist opsinator.py
      - name: Build DECIMER engine (opsinator_engine)
        run: python -m nuitka --standalone --assume-yes-for-downloads --output-dir=dist opsinator_engine.py
      - uses: actions/upload-artifact@v4
        with:
          name: OPSINatorFull-windows-latest
          path: |
            dist/opsinator.dist
            dist/opsinator_engine.dist

  # macOS and Linux: both binaries via PyInstaller (fast, proven today).
  build-unix:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install tkinter (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y python3-tk
      - name: Install project dependencies
        run: pip install decimer rdkit pyinstaller
      - name: Build both apps with shared dependencies (MERGE)
        run: pyinstaller opsinator.spec
      - uses: actions/upload-artifact@v4
        with:
          name: OPSINatorFull-${{ matrix.os }}
          path: |
            dist/opsinator
            dist/opsinator_engine
